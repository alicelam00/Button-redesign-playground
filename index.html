<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button States Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="prototype">
    <h1>Button component</h1>

    <div class="interactive-demo" aria-label="Interactive buttons">
      <div class="interactive-demo__panel">
        <div class="interactive-demo__cluster">
          <div class="interactive-demo__row interactive-demo__row--core">
            <button type="button" class="button" data-kind="primary" id="interactive-primary-btn">Primary</button>
            <button type="button" class="button" data-kind="secondary" id="interactive-secondary-btn">Secondary</button>
            <button type="button" class="button" data-kind="plain" id="interactive-plain-btn" hidden>Tertiary</button>
          </div>
          <div class="interactive-demo__row interactive-demo__row--core">
            <button type="button" class="button" data-kind="primary" data-variant="primary-2" id="interactive-primary-btn-2">Primary button 2</button>
            <button type="button" class="button" data-kind="secondary" data-variant="secondary-2" id="interactive-secondary-btn-2">Secondary button 2</button>
          </div>
          <div class="interactive-demo__row interactive-demo__row--core">
            <button type="button" class="button" data-kind="primary" data-variant="primary-3" id="interactive-primary-btn-3">Primary button 3</button>
            <button type="button" class="button" data-kind="secondary" data-variant="secondary-3" id="interactive-secondary-btn-3">Secondary button 3</button>
          </div>
        </div>
      </div>
    </div>

    <h2 class="section-title" hidden>Variants</h2>
    <div class="variants-table" id="variants-table" hidden></div>
  </div>

  <div class="settings-widget" id="settings-widget">
    <div class="settings-widget__header">
      <span class="settings-widget__title">Settings</span>
    </div>
    <div class="settings-widget__body">
      <div class="settings-widget__panel">

        <!-- Theme row -->
        <div class="settings-widget__theme-row">
          <span class="settings-widget__label">Theme</span>
          <select class="settings-widget__select settings-widget__select--sm" id="setting-theme">
            <option value="button-overview" selected>Button overview</option>
            <option value="plain-goods">Plain goods</option>
            <option value="pitch">Pitch</option>
            <option value="heritage">Heritage</option>
            <option value="ghia">Ghia</option>
          </select>
        </div>

        <!-- Buttons section -->
        <div class="settings-widget__section">
          <button type="button" class="settings-widget__section-header" id="section-buttons-btn" aria-expanded="false" aria-controls="section-buttons-content">
            <span>Buttons</span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="settings-widget__section-content is-collapsed" id="section-buttons-content">
            <div class="settings-widget__section-content-inner">

              <div class="settings-widget__group">
                <div class="settings-widget__row">
                  <span class="settings-widget__label">Primary</span>
                  <div class="settings-widget__color-wrap">
                    <input type="color" class="settings-widget__color" id="setting-branded-bg" value="#005BD3">
                    <input type="text" class="settings-widget__color-hex" id="setting-branded-bg-hex" value="#005BD3" maxlength="7" spellcheck="false">
                  </div>
                </div>
                <div class="settings-widget__l-cols">
                  <span>Hover</span><span>Press</span><span>Border</span><span>Top</span><span>Bottom</span>
                  <input type="number" class="settings-widget__l-num" id="setting-primary-hover-l" value="5" step="1">
                  <input type="number" class="settings-widget__l-num" id="setting-primary-active-l" value="10" step="1">
                  <input type="number" class="settings-widget__l-num" id="setting-primary-border-contrast" value="12" step="1" min="0" max="100">
                  <input type="number" class="settings-widget__l-num" id="setting-primary-grad-top-l" value="20" step="1">
                  <input type="number" class="settings-widget__l-num" id="setting-primary-grad-bottom-l" value="10" step="1">
                </div>
              </div>

              <div class="settings-widget__group">
                <div class="settings-widget__row">
                  <span class="settings-widget__label">Secondary</span>
                </div>
                <input type="color" class="settings-widget__color" id="setting-secondary-bg" value="#F2F2F2" hidden>
                <input type="text" class="settings-widget__color-hex" id="setting-secondary-bg-hex" value="" maxlength="7" spellcheck="false" hidden>
                <div class="settings-widget__l-cols">
                  <span>Default</span><span>Hover</span><span>Press</span><span>2 & 3</span><span>Border</span>
                  <input type="number" class="settings-widget__l-num" id="setting-secondary-default-l" value="-4" step="1">
                  <input type="number" class="settings-widget__l-num" id="setting-secondary-hover-l" value="-9" step="1">
                  <input type="number" class="settings-widget__l-num" id="setting-secondary-active-l" value="-10" step="1">
                  <input type="number" class="settings-widget__l-num" id="setting-secondary-active23-l" value="-14" step="1">
                  <input type="number" class="settings-widget__l-num" id="setting-secondary-border-l" value="-14" step="1">
                </div>
              </div>

            </div>
          </div>
        </div>

        <!-- Colours section -->
        <div class="settings-widget__section">
          <button type="button" class="settings-widget__section-header" id="section-colours-btn" aria-expanded="false" aria-controls="section-colours-content">
            <span>Colours</span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="settings-widget__section-content is-collapsed" id="section-colours-content">
            <div class="settings-widget__section-content-inner">

              <div class="settings-widget__row">
                <span class="settings-widget__label">Background</span>
                <div class="settings-widget__color-wrap">
                  <input type="color" class="settings-widget__color" id="setting-background" value="#FFFFFF">
                  <input type="text" class="settings-widget__color-hex" id="setting-background-hex" value="#FFFFFF" maxlength="7" spellcheck="false">
                </div>
              </div>

              <div class="settings-widget__row">
                <span class="settings-widget__label">Text</span>
                <div class="settings-widget__color-wrap">
                  <input type="color" class="settings-widget__color" id="setting-branded-text" value="#000000">
                  <input type="text" class="settings-widget__color-hex" id="setting-branded-text-hex" value="#000000" maxlength="7" spellcheck="false">
                </div>
              </div>

              <div class="settings-widget__row">
                <span class="settings-widget__label">Accent</span>
                <div class="settings-widget__color-wrap">
                  <input type="color" class="settings-widget__color" id="setting-plain-color" value="#005BD3">
                  <input type="text" class="settings-widget__color-hex" id="setting-plain-color-hex" value="#005BD3" maxlength="7" spellcheck="false">
                </div>
              </div>

            </div>
          </div>
        </div>

        <!-- Button section -->
        <div class="settings-widget__section">
          <button type="button" class="settings-widget__section-header" id="section-button-btn" aria-expanded="false" aria-controls="section-button-content">
            <span>Styles</span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="settings-widget__section-content is-collapsed" id="section-button-content">
            <div class="settings-widget__section-content-inner">

              <div class="settings-widget__row">
                <span class="settings-widget__label">Border radius</span>
                <select class="settings-widget__select settings-widget__select--sm" id="setting-border-radius">
                  <option value="cornerradius-none">None · 0px</option>
                  <option value="cornerradius-small">Small · 8px</option>
                  <option value="cornerradius-base" selected>Base · 12px</option>
                  <option value="cornerradius-large">Large · 16px</option>
                  <option value="cornerradius-full">Full · 36px</option>
                </select>
              </div>

              <div class="settings-widget__row">
                <span class="settings-widget__label">Icon</span>
                <select class="settings-widget__select settings-widget__select--sm" id="setting-icon">
                  <option value="None" selected>None</option>
                  <option value="Left">Left</option>
                  <option value="Right">Right</option>
                  <option value="Only">Only</option>
                </select>
              </div>

              <div class="settings-widget__row">
                <span class="settings-widget__label">Size</span>
                <select class="settings-widget__select settings-widget__select--sm" id="setting-size-preset">
                  <option value="small">Small</option>
                  <option value="default" selected>Base</option>
                  <option value="large">Large</option>
                  <option value="extra-large">Extra large</option>
                </select>
              </div>

            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="settings-widget__footer">
          <button type="button" class="settings-widget__reset-all-btn" id="global-reset-all">Reset all</button>
        </div>

      </div>
    </div>
  </div>

  <script src="scripts/primary-config.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
